<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chessbot</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main>
    <h1>chessbot</h1>
    <div class="controls">
      <label>Play as
        <select id="color">
          <option value="white">White</option>
          <option value="black">Black</option>
        </select>
      </label>
      <button id="new">New game</button>
    </div>
    <div class="game">
      <div id="player-top" class="player-bar">
        <div class="avatar"></div>
        <div class="player-info">
          <span class="player-name"></span>
          <div class="captured"></div>
        </div>
      </div>
      <div id="board"></div>
      <div id="player-bottom" class="player-bar">
        <div class="avatar"></div>
        <div class="player-info">
          <span class="player-name"></span>
          <div class="captured"></div>
        </div>
      </div>
      <div class="action-row">
        <p id="status"></p>
        <button id="resign" title="Resign">
          <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
            <path fill="currentColor" d="M6 21V3h2v1h9.5l-2.2 4.5L17.5 13H8v8z"/>
          </svg>
          <span>Resign</span>
        </button>
      </div>
    </div>
  </main>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
